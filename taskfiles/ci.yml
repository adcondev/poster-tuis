version: '3'

tasks:
  debug:auth:
    desc: "🔍 Depuración: verifica el flujo de hash de la contraseña"
    cmds:
      - echo "Password from .env = {{.SCALE_DASHBOARD_PASSWORD}}"
      - echo "Auth token from .env = {{.SCALE_AUTH_TOKEN}}"
      - echo "Base64 hash for ldflags = '{{.SCALE_PASSWORD_HASH}}'"
      - echo "Si la cadena base64 contiene solo caracteres A-Za-z0-9+/=, es segura para ldflags."
      - echo "=========================================================="
      - echo "Password from .env = {{.TICKET_DASHBOARD_PASSWORD}}"
      - echo "Auth token from .env = {{.TICKET_AUTH_TOKEN}}"
      - echo "Base64 hash for ldflags = '{{.TICKET_PASSWORD_HASH}}'"
      - echo "Si la cadena base64 contiene solo caracteres A-Za-z0-9+/=, es segura para ldflags."

  linter:
    desc: "🔍 Ejecuta golangci-lint para el código del instalador"
    cmds:
      - task: :setup:init:all # <-- Añadido ':' al inicio
      - golangci-lint run --config=.golangci.yml --timeout=5m ./...

  test:
    desc: "✅ Ejecuta pruebas unitarias para el código del instalador"
    cmds:
      - task: :setup:init:all # <-- Añadido ':' al inicio
      - go test -v -coverprofile=coverage.txt -covermode=atomic ./...

  benchmark:
    desc: "⚡ Ejecuta benchmarks para el código del instalador"
    cmds:
      - task: :setup:init:all # <-- Añadido ':' al inicio
      - go test -v -bench=. ./...