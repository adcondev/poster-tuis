# poster-tuis/Taskfile.yml
# Unified Build System for R2k Daemon Services
# Dev: github.com/adcondev @ Red2000
# https://taskfile.dev

version: '3'

# 1. Native Taskfile support for .env files!
# This automatically loads your variables without using PowerShell.
dotenv: [ '.env' ]

# Silence all command output by default, set false for debug or use 'task --verbose' to override
silent: true

vars:
  # ══════════════════════════════════════════════════════════════
  # 📝 GLOBAL CONFIGURATION
  # ══════════════════════════════════════════════════════════════
  # Date/Time for ldflags (Windows format)
  DATE:
    sh: powershell -Command "Get-Date -Format 'yyyy-MM-dd'"
  TIME:
    sh: powershell -Command "Get-Date -Format 'HH:mm:ss'"

  INSTALLER_SVC_NAME: "R2k_POS_Instalador.exe"

  # ══════════════════════════════════════════════════════════════
  # 🔐 SECURITY: Variables loaded directly from .env
  # ══════════════════════════════════════════════════════════════

  # 2. Those should be defined in your .env file, not hardcoded here.
  # WARNING: If coded here they override .env values and pose a security risk if committed to version control.
  # SCALE_AUTH_TOKEN: ""
  # SCALE_DASHBOARD_PASSWORD: ""
  # SCALE_PORT: ""
  # TICKET_AUTH_TOKEN: ""
  # TICKET_DASHBOARD_PASSWORD: ""
  # TICKET_PORT: ""

  # Hash the password automatically loaded from .env
  SCALE_PASSWORD_HASH:
    sh: SCALE_HASH_PW='{{.SCALE_DASHBOARD_PASSWORD}}' go run -ldflags '-s -w -X main.Srvc=scale -H=windowsgui' ./cmd/hashpw/main.go
  TICKET_PASSWORD_HASH:
    sh: TICKET_HASH_PW='{{.TICKET_DASHBOARD_PASSWORD}}' go run -ldflags '-s -w -X main.Srvc=ticket -H=windowsgui' ./cmd/hashpw/main.go

  # ══════════════════════════════════════════════════════════════
  # 🔧 LDFLAGS CONFIGURATION
  # ══════════════════════════════════════════════════════════════
  # Scale uses internal/config package variables (see SCALE_CONFIG)
  SCALE_CONFIG: "github.com/adcondev/scale-daemon/internal/config"
  # Updated ldflags with security injections + trimpath
  LDFLAGS_SCALE_BASE: >-
    -s -w
    -X '{{.SCALE_CONFIG}}.BuildDate={{.DATE}}'
    -X '{{.SCALE_CONFIG}}.BuildTime={{.TIME}}'
    -X '{{.SCALE_CONFIG}}.PasswordHashB64={{.SCALE_PASSWORD_HASH}}'
    -X '{{.SCALE_CONFIG}}.AuthToken={{.SCALE_AUTH_TOKEN}}'
    -X '{{.SCALE_CONFIG}}.ServerPort={{.SCALE_PORT}}'
    -H=windowsgui

  # Ticket uses internal/daemon package path
  TICKET_CONFIG: "github.com/adcondev/ticket-daemon/internal/config"
  LDFLAGS_TICKET_BASE: >-
    -s -w
    -X '{{.TICKET_CONFIG}}.BuildDate={{.DATE}}'
    -X '{{.TICKET_CONFIG}}.BuildTime={{.TIME}}'
    -X '{{.TICKET_CONFIG}}.PasswordHashB64={{.TICKET_PASSWORD_HASH}}'
    -X '{{.TICKET_CONFIG}}.AuthToken={{.TICKET_AUTH_TOKEN}}'
    -X '{{.TICKET_CONFIG}}.ServerPort={{.TICKET_PORT}}'
    -H=windowsgui

  # ══════════════════════════════════════════════════════════════
  # 🏷️ NAMING CONVENTION: R2k_<<Daemon>><<Type>>_<<Env>>.exe
  # ══════════════════════════════════════════════════════════════
  # Scale
  SCALE_SVC_ID_LOCAL: "R2k_BasculaServicio_Local"
  SCALE_SVC_ID_REMOTE: "R2k_BasculaServicio_Remote"
  SCALE_CMD_ID_LOCAL: "R2k_BasculaCmd_Local"
  SCALE_CMD_ID_REMOTE: "R2k_BasculaCmd_Remote"
  SCALE_SVC_DISPLAY_LOCAL: "Servicio de Báscula (Local)"
  SCALE_SVC_DISPLAY_REMOTE: "Servicio de Báscula (Remoto)"
  SCALE_SVC_DESC_REMOTE: "Servicio de comunicación con bascula via WebSocket"

  # Ticket
  TICKET_SVC_ID_LOCAL: "R2k_TicketServicio_Local"
  TICKET_SVC_ID_REMOTE: "R2k_TicketServicio_Remote"
  TICKET_CMD_ID_LOCAL: "R2k_TicketCmd_Local"
  TICKET_CMD_ID_REMOTE: "R2k_TicketCmd_Remote"
  TICKET_SVC_DISPLAY_LOCAL: "Servicio de Impresión de Tickets (Local)"
  TICKET_SVC_DISPLAY_REMOTE: "Servicio de Impresión de Tickets (Remoto)"
  TICKET_SVC_DESC: "Servicio de impresión de tickets POS via WebSocket"

  # ══════════════════════════════════════════════════════════════
  # 🎯 INSTALLER CONFIGURATION
  # ══════════════════════════════════════════════════════════════

  # Installer paths
  ASSETS_BIN_DIR:
    sh: powershell -Command "(Get-Location).Path + '\internal\assets\bin'"
  DIST_DIR:
    sh: powershell -Command "(Get-Location).Path + '\dist'"

  # Source repositories
  SCALE_SRC: "../scale-daemon"
  TICKET_SRC: "../ticket-daemon"

  # Installer ldflags
  TUIS_CONFIG: "github.com/adcondev/poster-tuis/internal/config"
  LDFLAGS_INSTALLER: >-
    -s -w
    -X '{{.TUIS_CONFIG}}.BuildDate={{.DATE}}'
    -X '{{.TUIS_CONFIG}}.BuildTime={{.TIME}}'
    -X '{{.TUIS_CONFIG}}.ScaleIDLocal={{.SCALE_SVC_ID_LOCAL}}'
    -X '{{.TUIS_CONFIG}}.ScaleIDRemote={{.SCALE_SVC_ID_REMOTE}}'
    -X '{{.TUIS_CONFIG}}.ScaleDisplayLocal={{.SCALE_SVC_DISPLAY_LOCAL}}'
    -X '{{.TUIS_CONFIG}}.ScaleDisplayRemote={{.SCALE_SVC_DISPLAY_REMOTE}}'
    -X '{{.TUIS_CONFIG}}.TicketIDLocal={{.TICKET_SVC_ID_LOCAL}}'
    -X '{{.TUIS_CONFIG}}.TicketIDRemote={{.TICKET_SVC_ID_REMOTE}}'
    -X '{{.TUIS_CONFIG}}.TicketDisplayLocal={{.TICKET_SVC_DISPLAY_LOCAL}}'
    -X '{{.TUIS_CONFIG}}.TicketDisplayRemote={{.TICKET_SVC_DISPLAY_REMOTE}}'


env:
  CGO_ENABLED: '0'
  GOOS: windows
  GOARCH: amd64

tasks:
  list:
    desc: "📋 List all tasks with descriptions"
    cmds:
      - task --list-all

  init:assets:
    desc: "🛠️ Create internal/assets/bin directory"
    internal: true
    cmds:
      - powershell -Command "if (!(Test-Path '{{.ASSETS_BIN_DIR}}')) { New-Item -ItemType Directory -Path '{{.ASSETS_BIN_DIR}}' -Force | Out-Null }"
    status:
      - test -d "{{.ASSETS_BIN_DIR}}"

  init:dist:
    desc: "🛠️ Create dist directory"
    internal: true
    cmds:
      - powershell -Command "if (!(Test-Path '{{.DIST_DIR}}')) { New-Item -ItemType Directory -Path '{{.DIST_DIR}}' -Force | Out-Null }"
    status:
      - test -d "{{.DIST_DIR}}"

  debug:auth:
    desc: "🔍 Debug: verify password hash pipeline"
    cmds:
      - echo "Password from .env = {{.SCALE_DASHBOARD_PASSWORD}}"
      - echo "Auth token from .env = {{.SCALE_AUTH_TOKEN}}"
      - echo "Base64 hash for ldflags = '{{.SCALE_PASSWORD_HASH}}'"
      - echo "If the base64 string contains only A-Za-z0-9+/= chars, it is safe for ldflags."
      - echo "=========================================================="
      - echo "Password from .env = {{.TICKET_DASHBOARD_PASSWORD}}"
      - echo "Auth token from .env = {{.TICKET_AUTH_TOKEN}}"
      - echo "Base64 hash for ldflags = '{{.TICKET_PASSWORD_HASH}}'"
      - echo "If the base64 string contains only A-Za-z0-9+/= chars, it is safe for ldflags."

  # ══════════════════════════════════════════════════════════════
  # 📦 INSTALLER SERVICE BUILDS (Output to assets/bin)
  # ══════════════════════════════════════════════════════════════
  installer:build:scale-local:
    desc: "📦 Build Scale Service (Local) for embedding"
    dir: "{{.SCALE_SRC}}"
    deps: [ init:assets ]
    internal: true
    cmds:
      - go build -ldflags "{{.LDFLAGS_SCALE_BASE}} -X {{.SCALE_CONFIG}}.BuildEnvironment=local -X {{.SCALE_CONFIG}}.ServiceName={{.SCALE_SVC_ID_LOCAL}}" -o "{{.ASSETS_BIN_DIR}}/{{.SCALE_SVC_ID_LOCAL}}.exe" ./cmd/BasculaServicio
      - echo "✅ Built {{.SCALE_SVC_ID_LOCAL}}.exe for installer"

  installer:build:scale-remote:
    desc: "📦 Build Scale Service (Remoto) for embedding"
    dir: "{{.SCALE_SRC}}"
    deps: [ init:assets ]
    internal: true
    cmds:
      - go build -ldflags "{{.LDFLAGS_SCALE_BASE}} -X {{.SCALE_CONFIG}}.BuildEnvironment=remote -X {{.SCALE_CONFIG}}.ServiceName={{.SCALE_SVC_ID_REMOTE}}" -o "{{.ASSETS_BIN_DIR}}/{{.SCALE_SVC_ID_REMOTE}}.exe" ./cmd/BasculaServicio
      - echo "✅ Built {{.SCALE_SVC_ID_REMOTE}}.exe for installer"

  installer:build:ticket-local:
    desc: "📦 Build Ticket Service (Local) for embedding"
    dir: "{{.TICKET_SRC}}"
    deps: [ init:assets ]
    internal: true
    cmds:
      - go build -ldflags "{{.LDFLAGS_TICKET_BASE}} -X {{.TICKET_CONFIG}}.BuildEnvironment=local -X {{.TICKET_CONFIG}}.ServiceName={{.TICKET_SVC_ID_LOCAL}}" -o "{{.ASSETS_BIN_DIR}}/{{.TICKET_SVC_ID_LOCAL}}.exe" ./cmd/TicketServicio
      - echo "✅ Built {{.TICKET_SVC_ID_LOCAL}}.exe for installer"

  installer:build:ticket-remote:
    desc: "📦 Build Ticket Service (Remoto) for embedding"
    dir: "{{.TICKET_SRC}}"
    deps: [ init:assets ]
    internal: true
    cmds:
      - go build -ldflags "{{.LDFLAGS_TICKET_BASE}} -X {{.TICKET_CONFIG}}.BuildEnvironment=remote -X {{.TICKET_CONFIG}}.ServiceName={{.TICKET_SVC_ID_REMOTE}}" -o "{{.ASSETS_BIN_DIR}}/{{.TICKET_SVC_ID_REMOTE}}.exe" ./cmd/TicketServicio
      - echo "✅ Built {{.TICKET_SVC_ID_REMOTE}}.exe for installer"

  installer:build:services:
    desc: "📦 Build ALL service binaries for embedding (4 total)"
    cmds:
      - task: installer:build:scale-local
      - task: installer:build:scale-remote
      - task: installer:build:ticket-local
      - task: installer:build:ticket-remote
      - echo ""
      - echo "══════════════════════════════════════════════════════════════"
      - echo "  ✅ All service binaries ready for embedding"
      - echo "══════════════════════════════════════════════════════════════"

  installer:build:
    desc: "🚀 Build TUI Installer with embedded services"
    deps: [ installer:build:services, init:dist ]
    cmds:
      - go build -ldflags "{{.LDFLAGS_INSTALLER}}" -o "{{.DIST_DIR}}/{{.INSTALLER_SVC_NAME}}" ./cmd/R2kInstaller
      - echo ""
      - echo "══════════════════════════════════════════════════════════════"
      - echo "  ✅ INSTALLER BUILD COMPLETE"
      - echo "  📁 Output:{{.DIST_DIR}}"
      - echo "══════════════════════════════════════════════════════════════"

  installer:rebuild:
    desc: "🔄 Clean and rebuild installer from scratch"
    cmds:
      - task: clean:installer
      - task: installer:build

  # ══════════════════════════════════════════════════════════════
  # 🧹 UTILITIES
  # ══════════════════════════════════════════════════════════════

  clean:installer:
    desc: "🧹 Clean installer build artifacts"
    internal: true
    cmds:
      - cmd: powershell -Command "if (Test-Path '{{.ASSETS_BIN_DIR}}') { Remove-Item -Recurse -Force '{{.ASSETS_BIN_DIR}}' -ErrorAction SilentlyContinue }"
        platforms: [ windows ]
      - cmd: powershell -Command "if (Test-Path '{{.DIST_DIR}}') { Remove-Item -Recurse -Force '{{.DIST_DIR}}' -ErrorAction SilentlyContinue }"
        platforms: [ windows ]
      - echo "✅ Cleaned installer artifacts"

  clean:all:
    desc: "🧹 Clean all project bin and tmp directories"
    internal: true
    cmds:

      - task: clean:installer
      - cmd: powershell -Command "Remove-Item -Path '../scale-daemon/bin', '../scale-daemon/tmp', '../ticket-daemon/bin' -Recurse -Force -ErrorAction SilentlyContinue"
        platforms: [ windows ]
      - cmd: rm -rf ../scale-daemon/bin ../ticket-daemon/bin
        platforms: [ linux, darwin ]
      - echo "✅ All projects cleaned"