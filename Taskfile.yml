# poster-tuis/Taskfile.yml
version: '3'

dotenv: [ '.env' ]
silent: true

includes:
  setup:
    taskfile: ./taskfiles/setup.yml
    dir: .
  build:
    taskfile: ./taskfiles/build.yml
    dir: .
  ci:
    taskfile: ./taskfiles/ci.yml
    dir: .

vars:
  DATE: '{{now | date "2006-01-02"}}'
  TIME: '{{now | date "15:04:05"}}'
  INSTALLER_SVC_NAME: "R2k_POS_Instalador.exe"

  SCALE_PASSWORD_HASH:
    sh: SCALE_HASH_PW='{{.SCALE_DASHBOARD_PASSWORD}}' go run -ldflags '-s -w -X main.Srvc=scale -H=windowsgui' ./cmd/hashpw/main.go
  TICKET_PASSWORD_HASH:
    sh: TICKET_HASH_PW='{{.TICKET_DASHBOARD_PASSWORD}}' go run -ldflags '-s -w -X main.Srvc=ticket -H=windowsgui' ./cmd/hashpw/main.go

  SCALE_CONFIG: "github.com/adcondev/scale-daemon/internal/config"
  LDFLAGS_SCALE_BASE: >-
    -s -w
    -X '{{.SCALE_CONFIG}}.BuildDate={{.DATE}}'
    -X '{{.SCALE_CONFIG}}.BuildTime={{.TIME}}'
    -X '{{.SCALE_CONFIG}}.PasswordHashB64={{.SCALE_PASSWORD_HASH}}'
    -X '{{.SCALE_CONFIG}}.AuthToken={{.SCALE_AUTH_TOKEN}}'
    -X '{{.SCALE_CONFIG}}.ServerPort={{.SCALE_PORT}}'
    -H=windowsgui

  TICKET_CONFIG: "github.com/adcondev/ticket-daemon/internal/config"
  LDFLAGS_TICKET_BASE: >-
    -s -w
    -X '{{.TICKET_CONFIG}}.BuildDate={{.DATE}}'
    -X '{{.TICKET_CONFIG}}.BuildTime={{.TIME}}'
    -X '{{.TICKET_CONFIG}}.PasswordHashB64={{.TICKET_PASSWORD_HASH}}'
    -X '{{.TICKET_CONFIG}}.AuthToken={{.TICKET_AUTH_TOKEN}}'
    -X '{{.TICKET_CONFIG}}.ServerPort={{.TICKET_PORT}}'
    -H=windowsgui

  SCALE_SVC_ID_LOCAL: "R2k_BasculaServicio_Local"
  SCALE_SVC_ID_REMOTE: "R2k_BasculaServicio_Remote"
  SCALE_CMD_ID_LOCAL: "R2k_BasculaCmd_Local"
  SCALE_CMD_ID_REMOTE: "R2k_BasculaCmd_Remote"
  SCALE_SVC_DISPLAY_LOCAL: "Servicio de Báscula (Local)"
  SCALE_SVC_DISPLAY_REMOTE: "Servicio de Báscula (Remoto)"
  SCALE_SVC_DESC_REMOTE: "Servicio de comunicación con bascula via WebSocket"

  TICKET_SVC_ID_LOCAL: "R2k_TicketServicio_Local"
  TICKET_SVC_ID_REMOTE: "R2k_TicketServicio_Remote"
  TICKET_CMD_ID_LOCAL: "R2k_TicketCmd_Local"
  TICKET_CMD_ID_REMOTE: "R2k_TicketCmd_Remote"
  TICKET_SVC_DISPLAY_LOCAL: "Servicio de Impresión de Tickets (Local)"
  TICKET_SVC_DISPLAY_REMOTE: "Servicio de Impresión de Tickets (Remoto)"
  TICKET_SVC_DESC: "Servicio de impresión de tickets POS via WebSocket"

  ASSETS_BIN_DIR: '{{.ROOT_DIR}}/internal/assets/bin'
  DIST_DIR: '{{.ROOT_DIR}}/dist'
  SCALE_SRC: "../scale-daemon"
  TICKET_SRC: "../ticket-daemon"

  TUIS_CONFIG: "github.com/adcondev/poster-tuis/internal/config"
  LDFLAGS_INSTALLER: >-
    -s -w
    -X '{{.TUIS_CONFIG}}.BuildDate={{.DATE}}'
    -X '{{.TUIS_CONFIG}}.BuildTime={{.TIME}}'
    -X '{{.TUIS_CONFIG}}.ScaleIDLocal={{.SCALE_SVC_ID_LOCAL}}'
    -X '{{.TUIS_CONFIG}}.ScaleIDRemote={{.SCALE_SVC_ID_REMOTE}}'
    -X '{{.TUIS_CONFIG}}.ScaleDisplayLocal={{.SCALE_SVC_DISPLAY_LOCAL}}'
    -X '{{.TUIS_CONFIG}}.ScaleDisplayRemote={{.SCALE_SVC_DISPLAY_REMOTE}}'
    -X '{{.TUIS_CONFIG}}.TicketIDLocal={{.TICKET_SVC_ID_LOCAL}}'
    -X '{{.TUIS_CONFIG}}.TicketIDRemote={{.TICKET_SVC_ID_REMOTE}}'
    -X '{{.TUIS_CONFIG}}.TicketDisplayLocal={{.TICKET_SVC_DISPLAY_LOCAL}}'
    -X '{{.TUIS_CONFIG}}.TicketDisplayRemote={{.TICKET_SVC_DISPLAY_REMOTE}}'

env:
  CGO_ENABLED: '0'
  GOOS: windows
  GOARCH: amd64

tasks:
  list:
    desc: "📋 Lista todas las tareas con sus descripciones"
    cmds:
      - task --list-all