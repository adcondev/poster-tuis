name: "Poster TUIS CodeQL Config"

disable-default-queries: false

queries:
  - uses: security-extended
  - uses: security-and-quality

paths-ignore:
  - '**/*_test.go'
  - 'test/**'
  - 'internal/testutils/**'
  - 'examples/**'
  - 'vendor/**'
  - 'testdata/**'
  - '*.exe'
  - '*.dll'
  - '*.so'
  - '.idea/**'
  - '.vscode/**'
  - 'internal/assets/bin/**' # Ignore generated service binaries

packs:
  - codeql/go-queries