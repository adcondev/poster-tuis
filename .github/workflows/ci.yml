name: CI

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [ main, master ]
    paths-ignore:
      - '**.md'
      - 'docs/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.25.x'

permissions:
  contents: read

jobs:
  pr-validation:
    name: 📋 PR Validation
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate PR Title
        uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            deps
            revert
          scopes: |
            github
            ui
            service
            config
            installer
            hashpw
            general
          requireScope: true
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The subject must start with lowercase letter.

  test:
    name: 🧪 Test and Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create dummy dependencies
        run: |
          task init:all

      - name: Run tests with race detection
        run: go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...

      - name: Generate coverage report
        run: |
          go tool cover -func=coverage.txt -o=coverage-summary.txt
          echo "## 📊 Test Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -n 1 coverage-summary.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  lint:
    name: 🔍 Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create dummy dependencies
        run: |
          task init:all

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          skip-cache: false
          args: --config=.golangci.yml --timeout=5m

  benchmark:
    name: ⚡ Performance Benchmarks
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create dummy dependencies
        run: |
          task init:all

      - name: Run benchmarks (base)
        continue-on-error: true
        run: |
          git checkout ${{ github.event.pull_request.base.sha }}
          go test -bench=. -benchmem -run=^$ ./... > /tmp/base-benchmark.txt 2>&1 || true

      - name: Run benchmarks (current)
        run: |
          git checkout ${{ github.event.pull_request.head.sha }}
          go test -bench=. -benchmem -run=^$ ./... > /tmp/current-benchmark.txt 2>&1

      - name: Compare benchmarks
        run: |
          cat > benchmark-comment.md << 'EOF'
          ## ⚡ Benchmark Results

          EOF

          if grep -q "^Benchmark" /tmp/current-benchmark.txt; then
            echo "### 📊 Current Branch Results" >> benchmark-comment.md
            echo '```' >> benchmark-comment.md
            grep "^Benchmark" /tmp/current-benchmark.txt | head -20 >> benchmark-comment.md
            echo '```' >> benchmark-comment.md

            if grep -q "^Benchmark" /tmp/base-benchmark.txt; then
              echo "" >> benchmark-comment.md
              echo "### 📊 Base Branch Results" >> benchmark-comment.md
              echo '```' >> benchmark-comment.md
              grep "^Benchmark" /tmp/base-benchmark.txt | head -20 >> benchmark-comment.md
              echo '```' >> benchmark-comment.md
              echo "" >> benchmark-comment.md
              echo "💡 Use \`benchstat\` for detailed statistical comparison" >> benchmark-comment.md
            fi
          else
            echo "⚠️ No benchmarks found in the current codebase." >> benchmark-comment.md
            echo "" >> benchmark-comment.md
            echo "To add benchmarks, create functions starting with \`Benchmark\` in \`*_test.go\` files." >> benchmark-comment.md
          fi

      - name: Post benchmark results to PR
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const comment = fs.readFileSync('benchmark-comment.md', 'utf8');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c => 
              c.user.type === 'Bot' && 
              c.body.includes('⚡ Benchmark Results')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: comment
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment
              });
            }

      - name: Add to job summary
        run: cat benchmark-comment.md >> $GITHUB_STEP_SUMMARY

  build:
    name: 🏗️ Build Check (Windows)
    runs-on: windows-latest # Required for PowerShell commands in Taskfile
    needs: test
    steps:
      - name: Checkout poster-tuis
        uses: actions/checkout@v6

      - name: Checkout Scale Daemon
        uses: actions/checkout@v6
        with:
          repository: adcondev/scale-daemon
          path: scale-daemon

      - name: Checkout Ticket Daemon
        uses: actions/checkout@v6
        with:
          repository: adcondev/ticket-daemon
          path: ticket-daemon

      - name: Checkout Poster Library
        uses: actions/checkout@v6
        with:
          repository: adcondev/poster
          path: poster

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate .env file
        run: |
          echo "SCALE_DASHBOARD_PASSWORD=${{ secrets.SCALE_DASHBOARD_PASSWORD || 'scale_ci' }}" >> .env
          echo "SCALE_AUTH_TOKEN=${{ secrets.SCALE_AUTH_TOKEN || 'token_ci' }}" >> .env
          echo "SCALE_PORT=${{ secrets.SCALE_PORT || '8765' }}" >> .env
          echo "TICKET_DASHBOARD_PASSWORD=${{ secrets.TICKET_DASHBOARD_PASSWORD || 'ticket_ci' }}" >> .env
          echo "TICKET_AUTH_TOKEN=${{ secrets.TICKET_AUTH_TOKEN || 'token_ci' }}" >> .env
          echo "TICKET_PORT=${{ secrets.TICKET_PORT || '8766' }}" >> .env
        shell: bash
        # Uses required env vars for successful injection during the build
      - name: Build via Taskfile
        run: |
          task installer:build SCALE_SRC="scale-daemon" TICKET_SRC="ticket-daemon"

      - name: Publish Artifact Summary
        run: |
          echo "## 📦 Build Artifact" >> $env:GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $env:GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $env:GITHUB_STEP_SUMMARY
          $file = Get-Item "dist\R2k_POS_Instalador.exe"
          $size = [math]::Round($file.Length / 1MB, 2)
          echo "| $($file.Name) | $($size) MB |" >> $env:GITHUB_STEP_SUMMARY